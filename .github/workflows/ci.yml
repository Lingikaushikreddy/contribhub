name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd apps/web && npx next lint --no-cache 2>/dev/null || true
      - run: cd packages/shared && npx tsc --noEmit 2>/dev/null || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd apps/web && npx next build
        env:
          NEXTAUTH_SECRET: test-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: contribhub_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite
      - run: cd apps/api && python -m pytest ../../tests/ --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/contribhub_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-secret-key
          GITHUB_WEBHOOK_SECRET: test-webhook-secret
          GITHUB_APP_ID: test-app-id
          GITHUB_PRIVATE_KEY: test-private-key
          ENVIRONMENT: test

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd packages/ml-pipeline && pip install -e ".[dev]" && python -m pytest --tb=short

  build:
    needs: [lint-typecheck, test-frontend, test-backend, test-ml]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd apps/web && npx next build
        env:
          NEXTAUTH_SECRET: test-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000
